apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gcrdemo
  labels:
    owner: soto
  annotations:
    run.googleapis.com/minScale: '2'
    run.googleapis.com/invoker-iam-disabled: 'true'
spec:
  template:
    spec:
      containers:
        - image: <+artifacts.primary.image>
          ports:
            - containerPort: 8080
  traffic:
    - percent: 0
      tag: staging