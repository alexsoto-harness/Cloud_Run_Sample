pipeline:
  name: Cloud Run Blue Green
  identifier: GCR_Pipeline_Sample
  tags: {}
  projectIdentifier: soto_sandbox
  orgIdentifier: sandbox
  variables:
    - name: artifact_version
      type: String
      description: Artifact version to deploy
      required: true
      value: <+input>.default(neutral).selectOneFrom(neutral,blue,green)
    - name: primary_artifact
      type: String
      description: Primary artifact identifier
      required: true
      value: <+input>.default(artifact_gcr)
  stages:
    - stage:
        name: Cloud Run Blue Green Deploy
        identifier: google_cloud_run_service
        description: ""
        type: Deployment
        spec:
          deploymentType: GoogleCloudRun
          service:
            serviceRef: service_gcr
            serviceInputs:
              serviceDefinition:
                type: GoogleCloudRun
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+pipeline.variables.primary_artifact>
                      sources:
                        - identifier: artifact_gcr
                          type: GoogleArtifactRegistry
                          spec:
                            version: <+pipeline.variables.artifact_version>
          environment:
            environmentRef: gcr_test
            deployToAll: false
            infrastructureDefinitions:
              - identifier: gcr_test_infra
          execution:
            steps:
              - stepGroup:
                  steps:
                    - step:
                        type: DownloadManifests
                        name: Download Manifests
                        identifier: DownloadManifests
                        spec: {}
                        timeout: 10m
                    - step:
                        type: GoogleCloudRunPrepareRollbackData
                        name: Prepare Rollback Data
                        identifier: Google_Cloud_Run_Prepare_Rollback_Data
                        spec:
                          connectorRef: account.harnessImage
                          image: harness/google-cloud-run-plugin:1.0.6-linux-amd64
                          imagePullPolicy: Always
                        timeout: 10m
                    - step:
                        type: GoogleCloudRunDeploy
                        name: Deploy To Staging
                        identifier: Deploy_To_Staging
                        spec:
                          connectorRef: account.harnessImage
                          image: harness/google-cloud-run-plugin:1.0.6-linux-amd64
                          imagePullPolicy: Always
                          skipTrafficShift: true
                        timeout: 10m
                    - step:
                        type: GoogleCloudRunTrafficShift
                        name: Tag New Revision
                        identifier: Tag_New_Revision
                        spec:
                          connectorRef: account.harnessImage
                          revisionTrafficDetails:
                            - revisionName: LATEST
                              trafficValue: 0
                              tag: staging
                            - revisionName: <+pipeline.stages.google_cloud_run_service.spec.execution.steps.Google_Cloud_Run_Step_Group.steps.Deploy_To_Staging.GoogleCloudRunDeployOutcome.revisionDetails[0].revisionName>
                              trafficValue: 100
                              tag: primary
                          image: harness/google-cloud-run-plugin:1.0.6-linux-amd64
                        timeout: 10m
                    - step:
                        type: Run
                        name: Tag Staging Revision
                        identifier: Tag_Staging_Revision
                        spec:
                          connectorRef: account.harnessImage
                          image: google/cloud-sdk:alpine
                          shell: Sh
                          command: |-
                            echo '<+secrets.getValue("account.GCP_Sales_Admin")>' > /tmp/sa-key.json
                            gcloud auth activate-service-account --key-file=/tmp/sa-key.json
                            gcloud run services update-traffic gcrdemo \
                              --set-tags staging=LATEST \
                              --region=northamerica-northeast2 \
                              --project=sales-209522
                            export STAGING_URL="https://staging---gcrdemo-980596850008.northamerica-northeast2.run.app"
                            echo "Staging URL: $STAGING_URL"
                          outputVariables:
                            - name: STAGING_URL
                              type: String
                              value: STAGING_URL
                        when:
                          stageStatus: Success
                          condition: "false"
                  name: Cloud Run Deploy to Staging
                  identifier: Google_Cloud_Run_Step_Group
                  sharedPaths:
                    - /var/run
                    - /var/lib/docker
                  stepGroupInfra:
                    type: KubernetesDirect
                    spec:
                      connectorRef: account.SEsandboxaccountK8s
                      namespace: harness-delegate-ng
              - step:
                  type: HarnessApproval
                  name: Cutover Approval
                  identifier: Cutover_Approval
                  spec:
                    approvalMessage: Test the new revision at <+execution.steps.Google_Cloud_Run_Step_Group.steps.Tag_Staging_Revision.output.outputVariables.STAGING_URL> before approving cutover to primary.
                    includePipelineExecutionHistory: true
                    isAutoRejectEnabled: false
                    approvers:
                      userGroups:
                        - account._account_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  timeout: 1d
              - stepGroup:
                  name: Cloud Run Traffic Shift
                  identifier: Cloud_Run_Traffic_Shift
                  steps:
                    - step:
                        type: DownloadManifests
                        name: Download Manifests
                        identifier: DownloadManifests_Cutover
                        spec: {}
                        timeout: 10m
                    - step:
                        type: GoogleCloudRunTrafficShift
                        name: Shift Traffic To Primary
                        identifier: Shift_Traffic_To_Primary
                        spec:
                          connectorRef: account.harnessImage
                          revisionTrafficDetails:
                            - revisionName: LATEST
                              trafficValue: 100
                              tag: primary
                          image: harness/google-cloud-run-plugin:1.0.6-linux-amd64
                        timeout: 10m
                  sharedPaths:
                    - /var/run
                    - /var/lib/docker
                  stepGroupInfra:
                    type: KubernetesDirect
                    spec:
                      connectorRef: org.se_sandbox_k8s
            rollbackSteps:
              - stepGroup:
                  identifier: Google_Cloud_Run_Rollback_Step_Group
                  name: Google Cloud Run Rollback Step Group
                  steps:
                    - step:
                        type: GoogleCloudRunRollback
                        name: Google Cloud Run Rollback
                        identifier: Google_Cloud_Run_Rollback
                        spec:
                          connectorRef: account.harnessImage
                          image: harness/google-cloud-run-plugin:1.0.6-linux-amd64
                          imagePullPolicy: Always
                        timeout: 10m
                  sharedPaths:
                    - /var/run
                    - /var/lib/docker
                  stepGroupInfra:
                    type: KubernetesDirect
                    spec:
                      connectorRef: account.SEsandboxaccountK8s
                      namespace: default
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
